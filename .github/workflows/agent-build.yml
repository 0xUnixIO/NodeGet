name: nodeget-agent-build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  agent-release:
    name: Build - ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: linux_x86_64_musl
            target: x86_64-unknown-linux-musl
            binary_name: nodeget-agent-linux-x86_64-musl
          - release_for: linux_aarch64_musl
            target: aarch64-unknown-linux-musl
            binary_name: nodeget-agent-linux-aarch64-musl

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version in Cargo.toml
        shell: python3 {0}
        env:
          TAG: ${{ github.ref_name }}
        run: |
          import re, os
          from datetime import datetime, timezone
          tag = os.environ.get('TAG', '')
          if tag.startswith('v') and len(tag) == 13:
              semver = f'{tag[1:]}.0.0'
          else:
              now = datetime.now(timezone.utc)
              semver = f'{now.strftime("%Y%m%d%H%M")}.0.0'
          for f in ['nodeget-lib/Cargo.toml', 'server/Cargo.toml', 'agent/Cargo.toml']:
              c = open(f).read()
              open(f, 'w').write(re.sub(r'^version = .+', f'version = "{semver}"', c, count=1, flags=re.M))
          print(f'Version set to {semver}')

      - name: Setup Rust
        uses: ./.github/actions/setup-system
        with:
          toolchain: stable
          components: clippy

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        working-directory: ./agent
        run: cargo clean && cross build --target ${{ matrix.platform.target }} --profile minimal --jobs 32
        env:
          CROSS_NO_WARNINGS: 0

      - name: Compress binary
        if: ${{ !matrix.platform.no_upx }}
        run: upx --brute ./target/${{ matrix.platform.target }}/minimal/nodeget-agent

      - name: Rename binary
        run: cp ./target/${{ matrix.platform.target }}/minimal/nodeget-agent ./target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}
          if-no-files-found: error

  release:
    name: Release
    needs: agent-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NodeGet ${{ github.ref_name }}"
          make_latest: true
          files: artifacts/*
